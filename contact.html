<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BC Beauty - Professional Makeup & Hairstyle Artist</title>
    <meta
      name="description"
      content="Professional makeup artist and hairstylist specializing in weddings, parties, photoshoots, and beauty education."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- header -->
    <!-- it can be component -->
    <div id="navbar"></div>

    <!-- Title Section -->
    <section class="title-section">
      <div class="container">
        <h2 class="section-title section-title--center">Contact</h2>
        <p class="section-description">
          Get a quote and book a free consultation for your special day or our academy services
        </p>
      </div>
      <div>
        <ul>
          <li>
            <img src="images/icons/ph_phone.svg" alt="Phone" />
            <p>+1 0000000000</p>
          </li>
          <li>
            <img src="images/icons/ic_baseline-whatsapp.svg" alt="WhatsApp" />
            <p>+1 0000000000</p>
          </li>
          <li>
            <img src="images/icons/iconoir_instagram.svg" alt="Instagram" />
            <p>carlabeatrizs_</p>
          </li>
        </ul>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact-form">
      <div class="contact-tab">
        <a href="contact_service-wedding.html">Services</a>
        <a href="contact_classes.html">Classes</a>
      </div>
      <form action="#" method="post">
        <div id="eventType">
          <h5>Event Type</h5>
          <input type="button" value="Wedding" />
          <input type="button" value="Party" />
          <input type="button" value="Photoshoot" />
          <!-- icon is in /images/icons/ -->
        </div>
        <div>
          <h5>Event Date</h5>
          <input type="date" id="event-date" name="event-date" />
          <div>
            <input type="checkbox" name="notDecided" id="notDecided" />
            <label for="notDecided">Not decided</label>
          </div>
        </div>
        <div>
          <h5>Event Time</h5>
          <input type="time" name="event-time" id="event-time" />
          <div>
            <input type="checkbox" name="notDecidedTime" id="notDecidedTime" />
            <label for="notDecidedTime">Not decided</label>
          </div>
        </div>

        <div>
          <h5>Name</h5>
          <input type="text" name="name" id="name" placeholder="Your name" />
        </div>

        <div>
          <h5>Contact</h5>
          <!-- call -->

          <input type="radio" name="contactMethod" id="contact-call" value="call" />
          <label for="contact-call">Call</label>
          <!-- need js for selecting country -->
          <input type="tel" name="callNumber" id="call-number" placeholder="Your mobile number" />

          <!-- whatsapp -->

          <input type="radio" name="contactMethod" id="contact-whatsapp" value="whatsapp" />
          <label for="contact-whatsapp">WhatsApp</label>
          <!-- need js for selecting country -->
          <input
            type="tel"
            name="whatsappNumber"
            id="whatsapp-number"
            placeholder="Your mobile number"
          />

          <!-- sms -->

          <input type="radio" name="contactMethod" id="contact-sms" value="sms" />
          <label for="contact-sms">SMS</label>
          <!-- need js for selecting country -->
          <input type="tel" name="smsNumber" id="sms-number" placeholder="Your mobile number" />

          <!-- email -->

          <input type="radio" name="contactMethod" id="contact-email" value="email" />
          <label for="contact-email">Email</label>
          <input type="email" name="emailAddress" id="email-address" placeholder="Your email" />
        </div>
        <div>
          <h5>When do you want us to call?</h5>

          <input type="radio" name="callTime" id="anytime" />
          <label for="anytime">I don't mind</label>

          <input type="radio" name="callTime" id="morning" />
          <label for="morning">Morning</label>

          <input type="radio" name="callTime" id="afternoon" />
          <label for="afternoon">Afternoon</label>

          <input type="radio" name="callTime" id="evening" />
          <label for="evening">Evening</label>
        </div>

        <!-- buttons -->
        <a href="contact_service-wedding.html">Next (Wedding)</a>
        <a href="contact_service-party.html">Next (Party)</a>
      </form>
    </section>

    <!-- it can be component -->
    <!-- Footer -->
   <div id="footer"></div>

    <!-- Scripts -->
    <script src="js/contact.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
