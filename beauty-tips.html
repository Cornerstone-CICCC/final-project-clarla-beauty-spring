<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BC Beauty - Professional Makeup & Hairstyle Artist</title>
    <meta
      name="description"
      content="Professional makeup artist and hairstylist specializing in weddings, parties, photoshoots, and beauty education."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- header -->
    <div id="navbar"></div>

    <!-- Title Section -->
    <section class="title-section">
      <div class="container">
        <h2 class="section-title section-title--center">Beauty tips</h2>
        <hr class="section-divider" />
        <p class="section-description">
          We offer classes for all skill levels, from beginners to future professionals.
        </p>
        <a href="https://www.instagram.com/carlabeatrizs_/" class="btn btn--primary">More on Instagram</a>
      </div>
    </section>

    <!-- Main -->
    <section class="beauty-tips-section">
      <div class="container">

        <!-- Categories -->
        <div class="beauty-tips-categories">
          <span>#All</span>
          <span>#Eyes</span>
          <span>#Base</span>
          <span>#Lips</span>
          <span>#Hair</span>
        </div>

        <!-- Grid -->
        <div class="beauty-tips-grid">
          <img src="images/beauty-tips/Frame 370.svg" alt="" />
          <img src="images/beauty-tips/videos.svg" alt="" />
          <img src="images/beauty-tips/videos-1.svg" alt="" />
          <img src="images/beauty-tips/videos-2.svg" alt="" />
          <img src="images/beauty-tips/videos-3.svg" alt="" />
          <img src="images/beauty-tips/videos-4.svg" alt="" />
          <img src="images/beauty-tips/videos-5.svg" alt="" />
          <img src="images/beauty-tips/videos-6.svg" alt="" />
          <img src="images/beauty-tips/videos-7.svg" alt="" />
          <img src="images/beauty-tips/videos-8.svg" alt="" />
          <img src="images/beauty-tips/videos-9.svg" alt="" />
          <img src="images/beauty-tips/videos-10.svg" alt="" />
        </div>

        <a href="" class="btn btn--primary">View More</a>
      </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
