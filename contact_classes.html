<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BC Beauty - Professional Makeup & Hairstyle Artist</title>
    <meta
      name="description"
      content="Professional makeup artist and hairstylist specializing in weddings, parties, photoshoots, and beauty education."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- header -->
    <div id="navbar"></div>

    <!-- Title Section -->
    <section class="title-section">
      <div class="container">
        <h2 class="section-title section-title--center">Contact</h2>
        <hr class="section-divider" />
        <p class="section-description">
          Get a quote and book a free consultation for your special day or our academy services
        </p>
      </div>
    </section>
    <section class="contact-info">
      <span class="contact-info-item">
        <img src="images/icons/ph_phone.svg" alt="Phone" />
        <span>+1 0000000000</span>
      </span>
      <span class="contact-info-item">
        <img src="images/icons/ic_baseline-whatsapp.svg" alt="WhatsApp" />
        <span>+1 0000000000</span>
      </span>
      <span class="contact-info-item">
        <img src="images/icons/iconoir_instagram.svg" alt="Instagram" />
        <span>carlabeatrizs_</span>
      </span>
    </section>

    <!-- Contact Section -->
    <section id="contact-form">
      <div class="contact-tab">
        <a href="contact.html">Services</a>
        <a href="contact_classes.html" id="tab-current">Classes</a>
      </div>
      <div class="breadcrumb">
        <img src="images/icons/arrow-back.svg" alt="Back" />
        <a href="contact.html">Back</a>
      </div>

      <form id="service-form" action="contact_classes-submitted.html" method="get">
        <div id="eventType" class="service-form-item">
          <h5>Event Type</h5>
          <div class="service-form-item-options">
            <input
              type="button"
              value="1-on-1 Master Subscription"
              class="event-type-btn is-selected"
            />
            <input type="button" value="1-day Makeup workshop" class="event-type-btn" />
            <input type="button" value="Self-Makeup beginner class" class="event-type-btn" />
          </div>
        </div>

        <div class="service-form-item">
          <h5>Class Date</h5>
          <label for="event-date">When you would like to take your class?</label>
          <input type="date" id="event-date" name="event-date" />
          <div>
            <input type="checkbox" name="notDecided" id="notDecided" />
            <label for="notDecided">Doesn't matter</label>
          </div>
        </div>

        <div class="service-form-item">
          <h5>Any questions?</h5>
          <textarea
            name="questions"
            id="anything-else"
            cols="30"
            rows="10"
            placeholder="Your message"
          ></textarea>
        </div>

        <div class="service-form-item" id="customerName">
          <h5>Name</h5>
          <input type="text" name="name" id="name" placeholder="Your name" required />
        </div>

        <div id="contactOption" class="service-form-item">
          <h5>Contact</h5>
          <div class="contact-option-row">
            <input type="radio" name="contactMethod" id="contact-call" value="call" checked />
            <label for="contact-call">Call</label>
            <input type="tel" name="callNumber" id="call-number" placeholder="Your mobile number" />
          </div>

          <div class="contact-option-row">
            <input type="radio" name="contactMethod" id="contact-whatsapp" value="whatsapp" />
            <label for="contact-whatsapp">WhatsApp</label>
            <input
              type="tel"
              name="whatsappNumber"
              id="whatsapp-number"
              placeholder="Your mobile number"
            />
          </div>

          <div class="contact-option-row">
            <input type="radio" name="contactMethod" id="contact-sms" value="sms" />
            <label for="contact-sms">SMS</label>
            <input type="tel" name="smsNumber" id="sms-number" placeholder="Your mobile number" />
          </div>

          <div class="contact-option-row">
            <input type="radio" name="contactMethod" id="contact-email" value="email" />
            <label for="contact-email">Email</label>
            <input type="email" name="emailAddress" id="email-address" placeholder="Your email" />
          </div>
        </div>

        <!-- buttons -->
        <button class="btn btn--primary" type="submit" formaction="contact_classes-submitted.html">
          Submit
        </button>
      </form>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="js/contact.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
